<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse — Team Availability</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #000000;
            --bg-card: #0a0a0a;
            --bg-card-hover: #111111;
            --accent: #5BA4B5;
            --accent-light: #7CBDCC;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --border: #222222;
            --green: #4ade80;
            --yellow: #fbbf24;
            --red: #ef4444;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 24px;
        }
        
        .container { max-width: 1400px; margin: 0 auto; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .logo-bars {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 36px;
        }
        
        .logo-bar {
            width: 8px;
            background: var(--accent);
            transform: skewX(-12deg);
        }
        
        .logo-bar:nth-child(1) { height: 50%; }
        .logo-bar:nth-child(2) { height: 75%; }
        .logo-bar:nth-child(3) { height: 100%; }
        
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        h1 span {
            color: var(--accent);
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .last-update { 
            color: var(--text-secondary); 
            font-size: 13px;
            font-weight: 500;
        }
        
        .refresh-btn {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 10px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        
        .refresh-btn:hover { 
            background: var(--accent);
            color: var(--bg-primary);
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 32px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }
        
        .stat-card.in::before { background: var(--green); }
        .stat-card.break::before { background: var(--yellow); }
        .stat-card.out::before { background: var(--red); }
        
        .stat-number { 
            font-family: 'Cinzel', serif;
            font-size: 64px; 
            font-weight: 700;
            line-height: 1;
        }
        
        .stat-card.in .stat-number { color: var(--green); }
        .stat-card.break .stat-number { color: var(--yellow); }
        .stat-card.out .stat-number { color: var(--red); }
        
        .stat-label { 
            color: var(--text-secondary); 
            margin-top: 12px; 
            text-transform: uppercase; 
            font-size: 12px; 
            letter-spacing: 2px;
            font-weight: 600;
        }
        
        .sections {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }
        
        .section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
        }
        
        .section h2 {
            font-family: 'Cinzel', serif;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }
        
        .section h2 .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        .section.in-section h2 .dot { background: var(--green); box-shadow: 0 0 12px var(--green); }
        .section.break-section h2 .dot { background: var(--yellow); box-shadow: 0 0 12px var(--yellow); }
        .section.out-section h2 .dot { background: var(--red); box-shadow: 0 0 12px var(--red); }
        
        .employee-list { list-style: none; }
        
        .employee {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .employee:last-child { border-bottom: none; }
        
        .employee-name { 
            font-weight: 500;
            font-size: 14px;
        }
        
        .employee-time { 
            color: var(--text-secondary); 
            font-size: 12px;
            font-weight: 500;
        }
        
        .empty-state {
            color: var(--text-secondary);
            font-style: italic;
            padding: 20px 0;
            font-size: 13px;
        }
        
        .powered-by {
            text-align: center;
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .powered-by span {
            color: var(--accent);
        }
        
        @media (max-width: 900px) {
            .stats-row { grid-template-columns: repeat(3, 1fr); gap: 12px; }
            .stat-card { padding: 20px; }
            .stat-number { font-size: 42px; }
            .sections { grid-template-columns: 1fr; }
        }
        
        @media (max-width: 600px) {
            header { flex-direction: column; gap: 20px; text-align: center; }
            .stats-row { grid-template-columns: 1fr; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-bars">
                    <div class="logo-bar"></div>
                    <div class="logo-bar"></div>
                    <div class="logo-bar"></div>
                </div>
                <h1><span>Pulse</span></h1>
            </div>
            <div class="header-right">
                <span class="last-update">Updated: <span id="lastUpdate">--</span></span>
                <button class="refresh-btn" onclick="loadData()">Refresh</button>
            </div>
        </header>
        
        <div class="stats-row">
            <div class="stat-card in">
                <div class="stat-number" id="countIn">-</div>
                <div class="stat-label">Clocked In</div>
            </div>
            <div class="stat-card break">
                <div class="stat-number" id="countBreak">-</div>
                <div class="stat-label">On Break</div>
            </div>
            <div class="stat-card out">
                <div class="stat-number" id="countOut">-</div>
                <div class="stat-label">Clocked Out</div>
            </div>
        </div>
        
        <div class="sections">
            <div class="section in-section">
                <h2><span class="dot"></span> Clocked In</h2>
                <ul class="employee-list" id="listIn">
                    <li class="empty-state">Loading...</li>
                </ul>
            </div>
            <div class="section break-section">
                <h2><span class="dot"></span> On Break</h2>
                <ul class="employee-list" id="listBreak">
                    <li class="empty-state">Loading...</li>
                </ul>
            </div>
            <div class="section out-section">
                <h2><span class="dot"></span> Clocked Out</h2>
                <ul class="employee-list" id="listOut">
                    <li class="empty-state">Loading...</li>
                </ul>
            </div>
        </div>
        
        <div class="powered-by">
            Powered by <span>1-800-NO-FAULT</span>
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://ymhhdipaplhzxpfhrunp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltaGhkaXBhcGxoenhwZmhydW5wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzAyNjYsImV4cCI6MjA4OTgwNjI2Nn0.iAg4MA9YCD85Ni9ZcWcbH5_-ULOX3DmhT2B2uqXywaQ';
        
        async function loadData() {
            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/employee_current_status?select=*`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        }
                    }
                );
                const data = await response.json();
                
                const byStatus = { IN: [], BREAK: [], OUT: [] };
                data.forEach(emp => {
                    if (byStatus[emp.status]) {
                        byStatus[emp.status].push(emp);
                    }
                });
                
                document.getElementById('countIn').textContent = byStatus.IN.length;
                document.getElementById('countBreak').textContent = byStatus.BREAK.length;
                document.getElementById('countOut').textContent = byStatus.OUT.length;
                
                updateList('listIn', byStatus.IN);
                updateList('listBreak', byStatus.BREAK);
                updateList('listOut', byStatus.OUT);
                
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('en-US', {
                    hour: 'numeric',
                    minute: '2-digit',
                    hour12: true,
                    timeZone: 'America/New_York'
                }) + ' ET';
                
            } catch (err) {
                console.error('Error loading data:', err);
            }
        }
        
        function updateList(elementId, employees) {
            const list = document.getElementById(elementId);
            if (employees.length === 0) {
                list.innerHTML = '<li class="empty-state">None</li>';
                return;
            }
            
            list.innerHTML = employees
                .sort((a, b) => (a.display_name || '').localeCompare(b.display_name || ''))
                .map(emp => {
                    const time = new Date(emp.recorded_at).toLocaleTimeString('en-US', {
                        hour: 'numeric',
                        minute: '2-digit',
                        hour12: true,
                        timeZone: 'America/New_York'
                    });
                    return `
                        <li class="employee">
                            <span class="employee-name">${emp.display_name || emp.slack_username || 'Unknown'}</span>
                            <span class="employee-time">since ${time}</span>
                        </li>
                    `;
                })
                .join('');
        }
        
        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
