<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse — Team Availability</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #000000;
            --bg-card: #0a0a0a;
            --bg-card-hover: #111111;
            --accent: #5BA4B5;
            --accent-light: #7CBDCC;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --border: #222222;
            --green: #4ade80;
            --yellow: #fbbf24;
            --red: #ef4444;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 24px;
        }
        
        .container { max-width: 1600px; margin: 0 auto; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .logo-img {
            height: 48px;
            width: auto;
        }
        
        .logo-divider {
            width: 1px;
            height: 36px;
            background: var(--border);
            margin: 0 8px;
        }
        
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        h1 span {
            color: var(--accent);
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .last-update { 
            color: var(--text-secondary); 
            font-size: 13px;
            font-weight: 500;
        }
        
        .refresh-btn {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 10px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        
        .refresh-btn:hover { 
            background: var(--accent);
            color: var(--bg-primary);
        }
        
        .team-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }
        
        .team-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }
        
        .team-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .team-title {
            font-family: 'Cinzel', serif;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
        }
        
        .team-stats {
            display: flex;
            gap: 16px;
        }
        
        .mini-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .mini-stat .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        .mini-stat.in .dot { background: var(--green); }
        .mini-stat.break .dot { background: var(--yellow); }
        .mini-stat.out .dot { background: var(--red); }
        
        .mini-stat.in { color: var(--green); }
        .mini-stat.break { color: var(--yellow); }
        .mini-stat.out { color: var(--red); }
        
        .status-columns {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .status-column h3 {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        .status-column h3 .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .status-column.in h3 .dot { background: var(--green); }
        .status-column.break h3 .dot { background: var(--yellow); }
        .status-column.out h3 .dot { background: var(--red); }
        
        .employee-list { list-style: none; }
        
        .employee {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .employee:last-child { border-bottom: none; }
        
        .employee-name { 
            font-weight: 500;
            font-size: 13px;
        }
        
        .employee-time { 
            color: var(--text-secondary); 
            font-size: 11px;
            font-weight: 500;
        }
        
        .empty-state {
            color: var(--text-secondary);
            font-style: italic;
            padding: 12px 0;
            font-size: 12px;
        }
        
        .powered-by {
            text-align: center;
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .powered-by span {
            color: var(--accent);
        }
        
        @media (max-width: 1100px) {
            .team-container { grid-template-columns: 1fr; }
        }
        
        @media (max-width: 700px) {
            .status-columns { grid-template-columns: 1fr; }
            .team-header { flex-direction: column; gap: 12px; align-items: flex-start; }
        }
        
        @media (max-width: 600px) {
            header { flex-direction: column; gap: 20px; text-align: center; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="logo.jpg" alt="1-800-NO-FAULT" class="logo-img">
                <div class="logo-divider"></div>
                <h1><span>Pulse</span></h1>
            </div>
            <div class="header-right">
                <span class="last-update">Updated: <span id="lastUpdate">--</span></span>
                <button class="refresh-btn" onclick="loadData()">Refresh</button>
            </div>
        </header>
        
        <div class="team-container">
            <!-- Intake Team -->
            <div class="team-section" id="intakeSection">
                <div class="team-header">
                    <div class="team-title">Intake</div>
                    <div class="team-stats">
                        <div class="mini-stat in"><span class="dot"></span><span id="intakeIn">0</span></div>
                        <div class="mini-stat break"><span class="dot"></span><span id="intakeBreak">0</span></div>
                        <div class="mini-stat out"><span class="dot"></span><span id="intakeOut">0</span></div>
                    </div>
                </div>
                <div class="status-columns">
                    <div class="status-column in">
                        <h3><span class="dot"></span> Clocked In</h3>
                        <ul class="employee-list" id="intakeListIn"><li class="empty-state">Loading...</li></ul>
                    </div>
                    <div class="status-column break">
                        <h3><span class="dot"></span> On Break</h3>
                        <ul class="employee-list" id="intakeListBreak"><li class="empty-state">Loading...</li></ul>
                    </div>
                    <div class="status-column out">
                        <h3><span class="dot"></span> Clocked Out</h3>
                        <ul class="employee-list" id="intakeListOut"><li class="empty-state">Loading...</li></ul>
                    </div>
                </div>
            </div>
            
            <!-- Retention Team -->
            <div class="team-section" id="retentionSection">
                <div class="team-header">
                    <div class="team-title">Retention / Audit</div>
                    <div class="team-stats">
                        <div class="mini-stat in"><span class="dot"></span><span id="retentionIn">0</span></div>
                        <div class="mini-stat break"><span class="dot"></span><span id="retentionBreak">0</span></div>
                        <div class="mini-stat out"><span class="dot"></span><span id="retentionOut">0</span></div>
                    </div>
                </div>
                <div class="status-columns">
                    <div class="status-column in">
                        <h3><span class="dot"></span> Clocked In</h3>
                        <ul class="employee-list" id="retentionListIn"><li class="empty-state">Loading...</li></ul>
                    </div>
                    <div class="status-column break">
                        <h3><span class="dot"></span> On Break</h3>
                        <ul class="employee-list" id="retentionListBreak"><li class="empty-state">Loading...</li></ul>
                    </div>
                    <div class="status-column out">
                        <h3><span class="dot"></span> Clocked Out</h3>
                        <ul class="employee-list" id="retentionListOut"><li class="empty-state">Loading...</li></ul>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="powered-by">
            Powered by <span>1-800-NO-FAULT</span>
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://ymhhdipaplhzxpfhrunp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltaGhkaXBhcGxoenhwZmhydW5wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzAyNjYsImV4cCI6MjA4OTgwNjI2Nn0.iAg4MA9YCD85Ni9ZcWcbH5_-ULOX3DmhT2B2uqXywaQ';
        
        async function loadData() {
            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/employee_current_status?select=*`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        }
                    }
                );
                const data = await response.json();
                
                // Separate by team
                const teams = {
                    intake: { IN: [], BREAK: [], OUT: [] },
                    retention: { IN: [], BREAK: [], OUT: [] }
                };
                
                data.forEach(emp => {
                    const team = emp.team || 'retention';
                    if (teams[team] && teams[team][emp.status]) {
                        teams[team][emp.status].push(emp);
                    }
                });
                
                // Update intake stats
                document.getElementById('intakeIn').textContent = teams.intake.IN.length;
                document.getElementById('intakeBreak').textContent = teams.intake.BREAK.length;
                document.getElementById('intakeOut').textContent = teams.intake.OUT.length;
                
                // Update retention stats
                document.getElementById('retentionIn').textContent = teams.retention.IN.length;
                document.getElementById('retentionBreak').textContent = teams.retention.BREAK.length;
                document.getElementById('retentionOut').textContent = teams.retention.OUT.length;
                
                // Update lists
                updateList('intakeListIn', teams.intake.IN);
                updateList('intakeListBreak', teams.intake.BREAK);
                updateList('intakeListOut', teams.intake.OUT);
                
                updateList('retentionListIn', teams.retention.IN);
                updateList('retentionListBreak', teams.retention.BREAK);
                updateList('retentionListOut', teams.retention.OUT);
                
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('en-US', {
                    hour: 'numeric',
                    minute: '2-digit',
                    hour12: true,
                    timeZone: 'America/New_York'
                }) + ' ET';
                
            } catch (err) {
                console.error('Error loading data:', err);
            }
        }
        
        function updateList(elementId, employees) {
            const list = document.getElementById(elementId);
            if (employees.length === 0) {
                list.innerHTML = '<li class="empty-state">None</li>';
                return;
            }
            
            list.innerHTML = employees
                .sort((a, b) => (a.display_name || '').localeCompare(b.display_name || ''))
                .map(emp => {
                    const time = new Date(emp.recorded_at).toLocaleTimeString('en-US', {
                        hour: 'numeric',
                        minute: '2-digit',
                        hour12: true,
                        timeZone: 'America/New_York'
                    });
                    return `
                        <li class="employee">
                            <span class="employee-name">${emp.display_name || emp.slack_username || 'Unknown'}</span>
                            <span class="employee-time">${time}</span>
                        </li>
                    `;
                })
                .join('');
        }
        
        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
