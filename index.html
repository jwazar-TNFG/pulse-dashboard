<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse — Team Availability</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        h1 { font-size: 28px; font-weight: 600; }
        h1 span { color: #4ade80; }
        .last-update { color: #888; font-size: 14px; }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #16213e;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }
        .stat-card.in { border-left: 4px solid #4ade80; }
        .stat-card.break { border-left: 4px solid #fbbf24; }
        .stat-card.out { border-left: 4px solid #ef4444; }
        .stat-number { font-size: 48px; font-weight: 700; }
        .stat-card.in .stat-number { color: #4ade80; }
        .stat-card.break .stat-number { color: #fbbf24; }
        .stat-card.out .stat-number { color: #ef4444; }
        .stat-label { color: #888; margin-top: 8px; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        
        .sections {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        .section {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
        }
        .section h2 {
            font-size: 16px;
            color: #888;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section h2 .emoji { font-size: 20px; }
        
        .employee-list { list-style: none; }
        .employee {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #2a2a4a;
        }
        .employee:last-child { border-bottom: none; }
        .employee-name { font-weight: 500; }
        .employee-time { color: #888; font-size: 13px; }
        
        .empty-state {
            color: #666;
            font-style: italic;
            padding: 20px 0;
        }
        
        .refresh-btn {
            background: #4ade80;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .refresh-btn:hover { background: #22c55e; }
        
        @media (max-width: 600px) {
            .stat-number { font-size: 36px; }
            .sections { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span>●</span> Pulse</h1>
            <div>
                <span class="last-update">Updated: <span id="lastUpdate">--</span></span>
                <button class="refresh-btn" onclick="loadData()">Refresh</button>
            </div>
        </header>
        
        <div class="stats-row">
            <div class="stat-card in">
                <div class="stat-number" id="countIn">-</div>
                <div class="stat-label">Clocked In</div>
            </div>
            <div class="stat-card break">
                <div class="stat-number" id="countBreak">-</div>
                <div class="stat-label">On Break</div>
            </div>
            <div class="stat-card out">
                <div class="stat-number" id="countOut">-</div>
                <div class="stat-label">Clocked Out</div>
            </div>
        </div>
        
        <div class="sections">
            <div class="section">
                <h2><span class="emoji">🟢</span> Clocked In</h2>
                <ul class="employee-list" id="listIn">
                    <li class="empty-state">Loading...</li>
                </ul>
            </div>
            <div class="section">
                <h2><span class="emoji">🟡</span> On Break</h2>
                <ul class="employee-list" id="listBreak">
                    <li class="empty-state">Loading...</li>
                </ul>
            </div>
            <div class="section">
                <h2><span class="emoji">🔴</span> Clocked Out</h2>
                <ul class="employee-list" id="listOut">
                    <li class="empty-state">Loading...</li>
                </ul>
            </div>
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://ymhhdipaplhzxpfhrunp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltaGhkaXBhcGxoenhwZmhydW5wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDI2NjI1MTUsImV4cCI6MjA1ODIzODUxNX0.kWNMTs2JICz9-xG_bKR7Xx-hRD7d1ZTXPF0LhT2yn8U';
        
        async function loadData() {
            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/employee_current_status?select=*`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        }
                    }
                );
                const data = await response.json();
                
                const byStatus = { IN: [], BREAK: [], OUT: [] };
                data.forEach(emp => {
                    if (byStatus[emp.status]) {
                        byStatus[emp.status].push(emp);
                    }
                });
                
                // Update counts
                document.getElementById('countIn').textContent = byStatus.IN.length;
                document.getElementById('countBreak').textContent = byStatus.BREAK.length;
                document.getElementById('countOut').textContent = byStatus.OUT.length;
                
                // Update lists
                updateList('listIn', byStatus.IN);
                updateList('listBreak', byStatus.BREAK);
                updateList('listOut', byStatus.OUT);
                
                // Update timestamp
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
                
            } catch (err) {
                console.error('Error loading data:', err);
            }
        }
        
        function updateList(elementId, employees) {
            const list = document.getElementById(elementId);
            if (employees.length === 0) {
                list.innerHTML = '<li class="empty-state">No one currently</li>';
                return;
            }
            
            list.innerHTML = employees
                .sort((a, b) => a.display_name.localeCompare(b.display_name))
                .map(emp => {
                    const time = new Date(emp.recorded_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    return `
                        <li class="employee">
                            <span class="employee-name">${emp.display_name || emp.slack_username || 'Unknown'}</span>
                            <span class="employee-time">since ${time}</span>
                        </li>
                    `;
                })
                .join('');
        }
        
        // Initial load
        loadData();
        
        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
